<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>bridge</title></head><body>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const file = params.get('file');
  if (!file || !/^[\w.-]+$/.test(file)) return;
  try {
    const r = await fetch('shots/' + file);
    const buf = await r.arrayBuffer();
    parent.postMessage({type: 'shot', name: file, buf: buf}, '*');
  } catch (e) {
    parent.postMessage({type: 'error', message: String(e)}, '*');
  }
})();
</script>
</body></html>
